<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>body{margin:0;background:oklch(0.16 0.03 255);}*{box-sizing:border-box;}a{text-decoration:none;}</style>
</helmet>

<div dir="rtl" style="direction:rtl;font-family:'Tajawal',sans-serif;background:oklch(0.16 0.03 255);color:oklch(0.95 0.01 255);min-height:100vh;">
  <dc-import name="Header" active="home" accent="{{ accent }}" hint-size="100%,74px"></dc-import>

  <div style="padding:14px 48px;background:oklch(0.14 0.028 255);border-bottom:1px solid oklch(0.25 0.03 255 / 0.5);font-size:13px;color:oklch(0.6 0.03 255);display:flex;gap:8px;">
    <a href="./الرئيسية.dc.html" style="color:oklch(0.6 0.03 255);">الرئيسية</a><span>/</span><span style="color:oklch(0.9 0.01 255);">تعلم عن بعد</span>
  </div>

  <div style="padding:60px 48px 100px;max-width:900px;margin:0 auto;text-align:center;">
    <h1 style="font-family:'Amiri',serif;font-size:32px;color:oklch(0.97 0.01 255);margin:0 0 18px;">تعلّم عن بُعد</h1>
    <p style="font-size:16px;color:oklch(0.65 0.03 255);line-height:1.9;margin:0 0 32px;">برنامج تعليمي عن بُعد يتيح لطلبة العلم متابعة الدروس والمشاركة في الاختبارات من أي مكان، بمتابعة دورية من المشرفين. التسجيل يُفتح قريبًا.</p>
    <a href="./الرئيسية.dc.html" style="display:inline-block;padding:14px 28px;border-radius:10px;border:1px solid oklch(0.4 0.04 255);color:oklch(0.9 0.02 255);font-weight:700;font-size:14.5px;">العودة للرئيسية</a>
  </div>

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:700},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563eb&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { accent: this.props.accentColor ?? '#2563eb' };
  }
}
</script>
</body>
</html>
