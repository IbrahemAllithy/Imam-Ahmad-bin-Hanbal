<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>body{margin:0;background:oklch(0.16 0.03 255);}*{box-sizing:border-box;}a{text-decoration:none;}</style>
</helmet>

<div dir="rtl" style="direction:rtl;font-family:'Tajawal',sans-serif;background:oklch(0.16 0.03 255);color:oklch(0.95 0.01 255);min-height:100vh;">
  <dc-import name="Header" active="lessons" accent="{{ accent }}" hint-size="100%,74px"></dc-import>

  <div style="padding:14px 48px;background:oklch(0.14 0.028 255);border-bottom:1px solid oklch(0.25 0.03 255 / 0.5);font-size:13px;color:oklch(0.6 0.03 255);display:flex;gap:8px;">
    <a href="./الرئيسية.dc.html" style="color:oklch(0.6 0.03 255);">الرئيسية</a><span>/</span><span style="color:oklch(0.9 0.01 255);">الدروس</span>
  </div>

  <div style="display:flex;gap:32px;padding:40px 48px;max-width:1400px;margin:0 auto;align-items:flex-start;">
    <aside style="width:280px;flex-shrink:0;position:sticky;top:90px;background:oklch(0.2 0.032 255);border:1px solid oklch(0.28 0.03 255);border-radius:14px;padding:20px;">
      <div style="font-size:15px;font-weight:700;color:oklch(0.95 0.01 255);margin-bottom:16px;">تصفّح حسب العلم</div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <sc-for list="{{ categoriesTree }}" as="cat" hint-placeholder-count="6">
          <div style="border-bottom:1px solid oklch(0.27 0.03 255);">
            <div onClick="{{ cat.toggle }}" style="display:flex;justify-content:space-between;align-items:center;padding:12px 4px;cursor:pointer;color:oklch(0.85 0.02 255);font-size:14.5px;font-weight:600;">
              <span>{{ cat.name }}</span>
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:11.5px;color:oklch(0.5 0.03 255);background:oklch(0.16 0.028 255);padding:2px 8px;border-radius:999px;">{{ cat.count }}</span>
                <span style="display:inline-block;width:7px;height:7px;border-right:2px solid oklch(0.55 0.03 255);border-bottom:2px solid oklch(0.55 0.03 255);transform:rotate(45deg);"></span>
              </div>
            </div>
            <sc-if value="{{ cat.isOpen }}" hint-placeholder-val="{{ false }}">
              <div style="display:flex;flex-direction:column;gap:2px;padding:0 0 12px 0;">
                <sc-for list="{{ cat.booksInCat }}" as="bk" hint-placeholder-count="2">
                  <a href="{{ bk.href }}" style="padding:9px 16px;font-size:13.5px;color:oklch(0.65 0.03 255);border-radius:7px;">{{ bk.title }}</a>
                </sc-for>
              </div>
            </sc-if>
          </div>
        </sc-for>
      </div>
    </aside>
    <div style="flex:1;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;">
        <h1 style="font-family:'Amiri',serif;font-size:28px;color:oklch(0.97 0.01 255);margin:0;">جميع الدروس</h1>
        <span style="font-size:14px;color:oklch(0.55 0.03 255);">{{ lessons.length }} دروس</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:22px;">
        <sc-for list="{{ lessons }}" as="ls" hint-placeholder-count="6">
          <div style="background:oklch(0.2 0.032 255);border:1px solid oklch(0.28 0.03 255);border-radius:14px;overflow:hidden;">
            <div style="aspect-ratio:16/9;background:repeating-linear-gradient(135deg,oklch(0.26 0.03 255),oklch(0.26 0.03 255) 8px,oklch(0.3 0.03 255) 8px,oklch(0.3 0.03 255) 16px);display:flex;align-items:center;justify-content:center;">
              <span style="font-family:monospace;font-size:11px;color:oklch(0.6 0.02 255);">صورة الدرس</span>
            </div>
            <div style="padding:18px;display:flex;flex-direction:column;gap:10px;">
              <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
                <span style="font-size:11.5px;color:{{ accent }};font-weight:600;">{{ ls.category }}</span>
                <span style="font-size:11px;color:oklch(0.55 0.03 255);border:1px solid oklch(0.35 0.03 255);border-radius:999px;padding:2px 9px;">{{ ls.level }}</span>
              </div>
              <div style="font-size:16px;font-weight:700;color:oklch(0.95 0.01 255);">{{ ls.title }}</div>
              <div style="display:flex;justify-content:space-between;font-size:13px;color:oklch(0.55 0.03 255);">
                <span>{{ ls.teacher }}</span>
                <span>{{ ls.duration }}</span>
              </div>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
  </div>

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1000},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563eb&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#2563eb&quot;,&quot;#1d4ed8&quot;,&quot;#0ea5e9&quot;,&quot;#3b82f6&quot;]}}">
class Component extends DCLogic {
  state = { expandedCategoryId: 'aqeedah' };
  toggleCategory = (id) => this.setState(s => ({ expandedCategoryId: s.expandedCategoryId === id ? null : id }));

  categories = [
    { id: 'aqeedah', name: 'العقيدة', count: 42 },
    { id: 'fiqh', name: 'الفقه', count: 65 },
    { id: 'hadith', name: 'الحديث', count: 38 },
    { id: 'tafsir', name: 'التفسير', count: 29 },
    { id: 'seerah', name: 'السيرة', count: 21 },
    { id: 'lugha', name: 'اللغة العربية', count: 17 },
  ];
  books = [
    { id: 1, title: 'شرح الأصول الثلاثة', category: 'العقيدة' },
    { id: 2, title: 'بلوغ المرام', category: 'الحديث' },
    { id: 3, title: 'الآجرومية', category: 'اللغة العربية' },
    { id: 4, title: 'عمدة الأحكام', category: 'الفقه' },
    { id: 5, title: 'تفسير الفاتحة وقصار السور', category: 'التفسير' },
    { id: 6, title: 'الرحيق المختوم', category: 'السيرة' },
  ];
  lessons = [
    { title: 'مقدمة في التوحيد', category: 'العقيدة', teacher: 'الشيخ عبدالله المنصور', duration: '34 د', level: 'مبتدئ' },
    { title: 'باب الطهارة', category: 'الفقه', teacher: 'الشيخ خالد الشمري', duration: '41 د', level: 'مبتدئ' },
    { title: 'شرح حديث الأعمال بالنيات', category: 'الحديث', teacher: 'الشيخ محمد العتيبي', duration: '28 د', level: 'متوسط' },
    { title: 'تفسير سورة الفاتحة', category: 'التفسير', teacher: 'الشيخ ياسر القحطاني', duration: '45 د', level: 'مبتدئ' },
    { title: 'الهجرة النبوية', category: 'السيرة', teacher: 'الشيخ فيصل الدوسري', duration: '52 د', level: 'متوسط' },
    { title: 'إعراب الجملة الاسمية', category: 'اللغة العربية', teacher: 'الشيخ سعد الحارثي', duration: '30 د', level: 'متقدم' },
  ];

  renderVals() {
    const accent = this.props.accentColor ?? '#2563eb';
    const categoriesTree = this.categories.map(cat => ({
      ...cat,
      isOpen: this.state.expandedCategoryId === cat.id,
      toggle: () => this.toggleCategory(cat.id),
      booksInCat: this.books.filter(b => b.category === cat.name).map(b => ({ ...b, href: `./كتاب.dc.html?id=${b.id}` })),
    }));
    return { accent, categoriesTree, lessons: this.lessons };
  }
}
</script>
</body>
</html>
