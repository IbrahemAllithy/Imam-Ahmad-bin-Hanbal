<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</helmet>
<header dir="rtl" style="direction:rtl;font-family:'Tajawal',sans-serif;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 48px;background:oklch(0.13 0.028 255 / 0.94);backdrop-filter:blur(12px);border-bottom:1px solid oklch(0.3 0.03 255 / 0.5);">
  <a href="./الرئيسية.dc.html" style="display:flex;align-items:center;gap:12px;cursor:pointer;">
    <img src="assets/logo.png" alt="شعار مجمع الإمام أحمد" style="width:42px;height:42px;border-radius:50%;flex-shrink:0;object-fit:cover;box-shadow:0 4px 14px oklch(0.4 0.1 250 / 0.45);"/>
    <div>
      <div style="font-size:17px;font-weight:800;color:oklch(0.97 0.01 255);font-family:'Amiri',serif;">الموقع الرسمي للشيخ شعبان العودة</div>
      <div style="font-size:11px;color:oklch(0.6 0.03 255);letter-spacing:0.4px;">مجمع الإمام أحمد</div>
    </div>
  </a>

  <nav style="display:flex;gap:6px;background:oklch(0.19 0.03 255);padding:6px;border-radius:12px;">
    <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="4">
      <a href="{{ item.href }}" style="padding:9px 20px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:14.5px;font-weight:500;background:{{ item.bg }};color:{{ item.color }};">{{ item.label }}</a>
    </sc-for>
  </nav>

  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:34px;height:34px;border-radius:50%;border:1.5px solid oklch(0.5 0.03 255);position:relative;cursor:pointer;flex-shrink:0;">
      <div style="width:12px;height:12px;border-radius:50%;border:1.6px solid oklch(0.75 0.02 255);position:absolute;top:6px;right:6px;"></div>
      <div style="width:6px;height:1.6px;background:oklch(0.75 0.02 255);position:absolute;bottom:8px;left:5px;transform:rotate(45deg);"></div>
    </div>
    <button style="padding:10px 20px;border-radius:8px;border:1px solid oklch(0.4 0.03 255);background:transparent;color:oklch(0.85 0.02 255);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:500;cursor:pointer;">تسجيل الدخول</button>
    <button style="padding:10px 22px;border-radius:8px;border:none;background:{{ accent }};color:white;font-weight:700;font-size:14px;cursor:pointer;">ابدأ الآن</button>
  </div>
</header>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;lessons&quot;,&quot;books&quot;,&quot;articles&quot;]},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563eb&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  navItems = [
    { id: 'home', label: 'الرئيسية', href: './الرئيسية.dc.html' },
    { id: 'lessons', label: 'الدروس', href: './الدروس.dc.html' },
    { id: 'books', label: 'الكتب', href: './الكتب.dc.html' },
    { id: 'articles', label: 'المقالات', href: './المقالات.dc.html' },
  ];

  renderVals() {
    const active = this.props.active ?? 'home';
    const accent = this.props.accent ?? '#2563eb';
    return {
      accent,
      navItems: this.navItems.map(n => ({
        ...n,
        color: n.id === active ? 'oklch(0.95 0.01 255)' : 'oklch(0.65 0.03 255)',
        bg: n.id === active ? 'oklch(0.24 0.035 255)' : 'transparent',
      })),
    };
  }
}
</script>
</body>
</html>
